<!DOCTYPE html>
<html>
<head>
    <title>Sales Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Sales Management</h2>

<h3>Add Sale</h3>

<input type="number" id="saleid" placeholder="Sales ID">
<input type="number" id="saleproduct" placeholder="Product ID">
<input type="number" id="saleqty" placeholder="Quantity">
<input type="date" id="saledate">
<input type="number" id="saleprice" placeholder="Selling Price">

<button onclick="addSale()">Add Sale</button>

<hr>

<h3>Update Sale</h3>

<input type="number" id="esaleid" placeholder="Sales ID">
<input type="number" id="esaleproduct" placeholder="Product ID">
<input type="number" id="esaleqty" placeholder="Quantity">
<input type="date" id="esaledate">
<input type="number" id="esaleprice" placeholder="Selling Price">

<button onclick="updateSale()">Update Sale</button>

<hr>

<table border="1">
<thead>
<tr>
<th>ID</th>
<th>Product</th>
<th>Quantity</th>
<th>Date</th>
<th>Price</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="salesTable"></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
