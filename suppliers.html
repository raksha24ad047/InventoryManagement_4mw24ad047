<!DOCTYPE html>
<html>
<head>
    <title>Supplier Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Supplier Management</h2>

<h3>Add Supplier</h3>

<input type="number" id="sid" placeholder="Supplier ID">
<input type="text" id="sname" placeholder="Name">
<input type="text" id="sphone" placeholder="Phone">
<input type="text" id="saddress" placeholder="Address">

<button onclick="addSupplier()">Add Supplier</button>

<hr>

<h3>Update Supplier</h3>

<input type="number" id="esid" placeholder="Supplier ID">
<input type="text" id="esname" placeholder="Name">
<input type="text" id="esphone" placeholder="Phone">
<input type="text" id="esaddress" placeholder="Address">

<button onclick="updateSupplier()">Update Supplier</button>

<hr>

<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Address</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody id="supplierTable"></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
